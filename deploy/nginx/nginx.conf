events { worker_connections 1024; }

http {
  include mime.types;

  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # SEC-C-2: 서버 정보 숨김
  server_tokens off;

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    # 보안 헤더
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' dapi.kakao.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.kakao.com *.daumcdn.net; connect-src 'self' wss://$host;";
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SEC-C-1: 쿠키 보안 강화
    proxy_cookie_path / "/; Secure; HttpOnly; SameSite=Strict";

    # SEC-C-2: 디렉터리 인덱싱 차단
    autoindex off;

    # 숨김 파일 접근 차단
    location ~ /\. {
      deny all;
      return 404;
    }

    # 위험 확장자 직접 접근 차단
    location ~* \.(env|git|gitignore|dockerignore|sql|log|bak|swp|old)$ {
      deny all;
      return 404;
    }

    # SEC-C-2: 소스맵 접근 차단 (프로덕션)
    location ~* \.map$ {
      deny all;
      return 404;
    }

    # 불필요한 HTTP 메서드 차단
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
      return 405;
    }

    # TRACE 메서드 차단 (XST 공격 방지)
    if ($request_method = TRACE) {
      return 405;
    }

    location / {
      proxy_pass http://frontend:80;
    }

    location /rest/ {
      proxy_pass http://kong:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      proxy_pass http://auth:9999/;
    }

    location /storage/ {
      proxy_pass http://storage:5000/;
      client_max_body_size 50M;
    }

    location /realtime/ {
      proxy_pass http://realtime:4000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
