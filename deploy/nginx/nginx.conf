events { worker_connections 1024; }

http {
  include mime.types;

  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # SEC-C-2: 서버 정보 숨김
  server_tokens off;

  # SEC-WEB-3: Rate Limiting 설정
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

  # 요청 크기 제한
  client_max_body_size 50M;
  client_body_timeout 30s;
  client_header_timeout 30s;

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    # ─── 보안 헤더 ───

    # XSS 방지
    add_header X-XSS-Protection "1; mode=block" always;

    # 콘텐츠 타입 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;

    # 클릭재킹 방지
    add_header X-Frame-Options "DENY" always;

    # HTTPS 강제 (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP (Content Security Policy)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' dapi.kakao.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data: blob: *.kakao.com *.daumcdn.net; connect-src 'self' wss://$host; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Referrer 정책
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 권한 정책
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self), payment=()" always;

    # SEC-C-1: 쿠키 보안 강화
    proxy_cookie_path / "/; Secure; HttpOnly; SameSite=Strict";

    # SEC-C-2: 디렉터리 인덱싱 차단
    autoindex off;

    # ─── CORS — 동일 도메인만 허용 ───
    set $cors_origin "";
    if ($http_origin ~* "^https://$host$") {
      set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight
    if ($request_method = 'OPTIONS') {
      return 204;
    }

    # 숨김 파일 접근 차단
    location ~ /\. {
      deny all;
      return 404;
    }

    # 위험 확장자 직접 접근 차단
    location ~* \.(env|git|gitignore|dockerignore|sql|log|bak|swp|old)$ {
      deny all;
      return 404;
    }

    # SEC-C-2: 소스맵 접근 차단 (프로덕션)
    location ~* \.map$ {
      deny all;
      return 404;
    }

    # 불필요한 HTTP 메서드 차단
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
      return 405;
    }

    # TRACE 메서드 차단 (XST 공격 방지)
    if ($request_method = TRACE) {
      return 405;
    }

    # ─── 429 에러 커스텀 응답 ───
    error_page 429 = @rate_limited;
    location @rate_limited {
      default_type application/json;
      return 429 '{"error": "요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요."}';
    }

    location / {
      limit_req zone=general burst=100 nodelay;
      proxy_pass http://frontend:80;
    }

    # ─── API Rate Limiting ───
    location /rest/ {
      limit_req zone=api burst=50 nodelay;
      limit_req_status 429;
      proxy_pass http://kong:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 로그인 Rate Limiting (엄격) ───
    location /auth/v1/token {
      limit_req zone=auth burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://auth:9999/;
    }

    location /auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://auth:9999/;
    }

    # ─── 파일 업로드 Rate Limiting ───
    location /storage/ {
      limit_req zone=upload burst=5 nodelay;
      limit_req_status 429;
      client_max_body_size 50M;
      proxy_pass http://storage:5000/;
    }

    location /realtime/ {
      proxy_pass http://realtime:4000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
