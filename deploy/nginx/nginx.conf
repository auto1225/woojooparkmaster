events { worker_connections 1024; }

http {
  include mime.types;

  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' dapi.kakao.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.kakao.com *.daumcdn.net; connect-src 'self' wss://$host;";
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    location / {
      proxy_pass http://frontend:80;
    }

    location /rest/ {
      proxy_pass http://kong:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
      proxy_pass http://auth:9999/;
    }

    location /storage/ {
      proxy_pass http://storage:5000/;
      client_max_body_size 50M;
    }

    location /realtime/ {
      proxy_pass http://realtime:4000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
